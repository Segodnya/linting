name: CI

on:
  pull_request:
    branches: [main]
  push:
    # main only: a PR check runs against a merge commit computed when the check
    # ran, and main can move on afterwards — so the commit a release tag is cut
    # from may never have been built exactly as it landed. Feature branches are
    # covered by their pull_request run.
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  # Every push to main shares one ref, so cancelling would let the next merge
  # kill the previous commit's run — and that commit is what a release tag gets
  # cut from. Superseded PR runs are still fair game.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup and verify
        uses: ./.github/actions/setup
        with:
          verify: 'true'

  commitlint:
    name: Commit messages
    runs-on: ubuntu-latest
    timeout-minutes: 3
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup
        uses: ./.github/actions/setup

      - name: Validate Conventional Commits
        run: pnpm commitlint --from origin/${{ github.base_ref }} --to HEAD --verbose
